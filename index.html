<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Modern KD Field Public School — Naveen Shahdara, Delhi · ESTD. 2004</title>
<meta name="description" content="Modern KD Field Public School, Panchsheel Garden, Naveen Shahdara, Delhi. Govt. recognised, established 2004 — a bright, safe school from Playgroup & Nursery up to Class 8. Home of Kidz Chill Street. Admissions open 2026–27." />
<meta name="theme-color" content="#1f2660" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  @keyframes pulse { 0%,100%{ transform: scale(1); opacity:1 } 50%{ transform: scale(1.5); opacity:.6 } }
  @keyframes float1 { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(-12px) } }
  @keyframes float2 { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(10px) } }
  @keyframes scrollx { from{ transform: translateX(0) } to{ transform: translateX(-50%) } }
  @keyframes fade { from{ opacity:0 } to{ opacity:1 } }
  @keyframes fadeUp { from{ opacity:0; transform: translateY(12px) } to{ opacity:1; transform:none } }

  /* ---------- Responsive overrides (mobile-first collapses) ---------- */
  @media (max-width: 980px) {
    .nav-links { display: none !important; }
    .nav-burger { display: flex !important; }
    .mobile-sheet { display: flex !important; }

    /* Hero collapses to one column, image first becomes second on small */
    [style*="grid-template-columns: 1.05fr 0.95fr"] {
      grid-template-columns: 1fr !important;
      gap: 36px !important;
      min-height: auto !important;
      padding-bottom: 48px !important;
    }
    /* About / Contact / Facilities two-col splits */
    [style*="grid-template-columns: 1fr 1fr"] {
      grid-template-columns: 1fr !important;
    }
    [style*="grid-template-columns: 1.1fr 0.9fr"],
    [style*="grid-template-columns: 1.2fr 1fr"] {
      grid-template-columns: 1fr !important;
    }
    /* Footer 3-col */
    [style*="grid-template-columns: 1.4fr 1fr 1fr"] {
      grid-template-columns: 1fr !important;
      gap: 28px !important;
    }
  }

  @media (max-width: 900px) {
    .section { padding: 60px 0 !important; }
    /* .grid class collapses (original rule) */
    .grid[style*="repeat(4"] { grid-template-columns: repeat(2, 1fr) !important; }
    .grid[style*="repeat(3"] { grid-template-columns: 1fr 1fr !important; }
    /* Gallery uses inline grid (no .grid class) */
    [style*="repeat(4, 1fr)"] {
      grid-template-columns: repeat(2, 1fr) !important;
    }
    /* Tile span-2 wide tiles stay span 2 on tablet */
  }

  @media (max-width: 680px) {
    body { font-size: 16.5px; }
    .wrap { padding: 0 18px; }
    .grid[style*="repeat(4"],
    .grid[style*="repeat(3"],
    .grid[style*="repeat(2"] { grid-template-columns: 1fr !important; }
    /* Gallery: single column on phones, drop tall/wide spans */
    [style*="repeat(4, 1fr)"] {
      grid-template-columns: 1fr !important;
      grid-auto-rows: auto !important;
    }
    [style*="grid-column: span 2"],
    [style*="grid-row: span 2"] {
      grid-column: span 1 !important;
      grid-row: span 1 !important;
    }
    /* Contact form internal 2-col input pairs */
    form [style*="grid-template-columns: 1fr 1fr"] {
      grid-template-columns: 1fr !important;
    }
    /* Floating hero cards smaller / repositioned */
    [style*="animation: float1"][style*="left: -26px"] { left: 0 !important; top: 14px !important; }
    [style*="animation: float2"][style*="right: -22px"] { right: 0 !important; bottom: 14px !important; }
  }

  @media (max-width: 480px) {
    /* Tighter hero stat row */
    h1 { letter-spacing: -0.02em; }
    /* Admission band padding */
    [style*="padding: 56px 50px"] { padding: 40px 24px !important; }
    /* Testimonial card padding */
    [style*="padding: 44px 46px"] { padding: 32px 22px !important; }
    /* CTA buttons full-width feel */
    .btn { font-size: 16px; padding: 13px 22px; }
  }

  @media (prefers-reduced-motion: reduce) {
    [style*="animation"] { animation: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<!-- StPageFlip: real page-turning flipbook (UMD global: window.St.PageFlip) -->
<script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>

<script src="data.js"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="home.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>
<script type="text/babel" src="pages2.jsx"></script>
<script type="text/babel" src="contact.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
